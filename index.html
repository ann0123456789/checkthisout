<!DOCTYPE html>
<html lang="zh-Hans">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>可爱的家</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Zhi+Mang+Xing&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <main>
        <!-- Section 1: Hero Header -->
        <section class="hero-section" id="top">
            <div class="hero-content hero-content-full">
                <div class="hero-image-wrapper glass-card">
                    <img src="pic/family.png" alt="Cute family drawing" class="hero-image" />
                </div>

                <div class="hero-text hero-text-bottom">
                    <h1>可爱的家</h1>
                    <p class="hero-description">
                    </p>
                </div>
            </div>

            <a href="#family" class="scroll-indicator" aria-label="Scroll to family section">
                <span>SCROLL</span>
                <span class="arrow">↓</span>
            </a>
        </section>

        <!-- Section 2: Family Carousel -->
        <section class="family-section" id="family">
            <div class="section-header">
                <p class="eyebrow">Our Little Universe</p>
                <h2>Family Members</h2>
            </div>

            <div class="carousel-wrapper">
                <button class="carousel-btn prev-btn" aria-label="Previous card">‹</button>

                <div class="carousel-track" id="familyCarousel">
                    <!-- Cards generated by JavaScript -->
                </div>

                <button class="carousel-btn next-btn" aria-label="Next card">›</button>
            </div>

            <div class="carousel-dots" id="carouselDots"></div>
        </section>

        <!-- Section 3: Memory Timeline -->
        <section class="timeline-section" id="memories">
            <div class="section-header">
                <p class="eyebrow">Time Marks Love</p>
                <h2>From 2005 To 2026</h2>
            </div>

            <div class="timeline" id="memoryTimeline">
                <!-- Timeline generated by JavaScript -->
            </div>
        </section>

        <!-- Section 4: Footer -->
        <footer class="footer-section">
            <p>我们的故事未完待续❤️...</p>
        </footer>
    </main>

    <!-- Floating Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        ↑
    </button>

    <script src="script.js"></script>
</body>

</html>
